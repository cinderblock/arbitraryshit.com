name: Refresh GitHub Stats

# Keeps data/github-stats.json (stars, issues, PRs, contributors, and
# "N commits ahead of the post's pinned sha") fresh even when the blog
# itself isn't changing. A commit here triggers the Cloudflare Pages
# rebuild that bakes the new numbers into the static pages.

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-github-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Refresh stats
        run: bun run refresh:github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- data/github-stats.json; then
            echo "Stats unchanged; nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/github-stats.json
            git commit -m "Refresh GitHub stats"
            git push
          fi
